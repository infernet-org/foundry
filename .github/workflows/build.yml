name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io/infernet-org/foundry

jobs:
  build-model:
    name: Build ${{ matrix.model }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        model: [qwen3.5-35b-a3b, qwen3-coder-30b-a3b, hermes-4.3-36b]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push model image
        uses: docker/build-push-action@v6
        with:
          context: models/${{ matrix.model }}/
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.model }}:latest
            ${{ github.ref_type == 'tag' && format('{0}/{1}:{2}', env.REGISTRY, matrix.model, github.ref_name) || '' }}
          cache-from: type=gha,scope=${{ matrix.model }}-v2
          cache-to: type=gha,mode=max,scope=${{ matrix.model }}-v2
